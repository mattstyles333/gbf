  <circle cx="49" cy="79" r="0.4" fill="white" opacity="0.4"/>
  <!-- Eye ring detail -->
  <circle cx="48" cy="78" r="4.5" fill="none" stroke="#2C4A5A" stroke-width="0.5" opacity="0.6"/>

  <!-- ===== BODY EDGE HIGHLIGHT ===== -->
