<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 220" fill="none">
  <defs>
    <!-- Water gradient -->
    <linearGradient id="waterTop" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#C8EDF5"/>
      <stop offset="50%" stop-color="#7DD3FC"/>
      <stop offset="100%" stop-color="#38BDF8"/>
    </linearGradient>
    <linearGradient id="waterMid" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#7DD3FC"/>
      <stop offset="50%" stop-color="#38BDF8"/>
      <stop offset="100%" stop-color="#0284C7"/>
    </linearGradient>
    <linearGradient id="waterBot" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#38BDF8"/>
      <stop offset="100%" stop-color="#0369A1"/>
    </linearGradient>
    <!-- Fish body -->
    <linearGradient id="fishTop" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#D4EFF7"/>
      <stop offset="40%" stop-color="#8DCFE5"/>
      <stop offset="100%" stop-color="#4A9BB8"/>
    </linearGradient>
    <linearGradient id="fishBot" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#6BB8D4"/>
      <stop offset="100%" stop-color="#2D7A9A"/>
    </linearGradient>
    <linearGradient id="dorsalFin" x1="0%" y1="100%" x2="0%" y2="0%">
      <stop offset="0%" stop-color="#2D7A9A"/>
      <stop offset="100%" stop-color="#8DCFE5"/>
    </linearGradient>
    <radialGradient id="eyeGrad" cx="35%" cy="35%" r="65%">
      <stop offset="0%" stop-color="#4A6A7A"/>
      <stop offset="100%" stop-color="#0A1E28"/>
    </radialGradient>
  </defs>

