  <path d="M72 70 Q78 72 80 76" stroke="#A8E0ED" stroke-width="0.5" fill="none" opacity="0.5"/>
  <!-- Right pectoral -->
  <path d="M92 82 Q82 94 70 100 Q76 92 72 84 Q78 86 80 82 Q84 86 92 80Z" fill="url(#pectGrad)" opacity="0.8"/>
  <path d="M72 92 Q78 90 80 86" stroke="#A8E0ED" stroke-width="0.5" fill="none" opacity="0.5"/>

