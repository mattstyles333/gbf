  <!-- ===== HEAD / SNOUT ===== -->
  <!-- Head shape - bonefish has a slightly bulbous head tapering to a rounded snout -->
  <path d="
    M58 80
    Q52 80 46 79
    Q40 78 36 77
    Q34 78 36 79
    Q40 80 46 81
    Q52 82 58 82
    Q55 81 58 80Z
  " fill="url(#snoutGrad)"/>

  <!-- Mouth - inferior (bonefish mouths are on the bottom of the snout) -->
  <ellipse cx="37" cy="80.5" rx="5" ry="1.2" fill="#1E5A75" opacity="0.6"/>
  <path d="M33 80.5 Q37 79.5 41 80.5" stroke="#1E5A75" stroke-width="0.8" fill="none" stroke-linecap="round"/>

  <!-- ===== GILL PLATE / OPERCUUM ===== -->
  <path d="M58 78 Q54 78 52 80 Q54 82 58 82" stroke="#1E5A75" stroke-width="0.8" fill="none" opacity="0.4"/>
  <path d="M62 77 Q58 76 56 78 Q58 80 62 80" stroke="#1E5A75" stroke-width="0.5" fill="none" opacity="0.3"/>

  <!-- Gill membrane lines -->
  <path d="M54 78 Q56 80 54 82" stroke="#1E5A75" stroke-width="0.4" fill="none" opacity="0.3"/>
  <path d="M56 77 Q58 79 56 81" stroke="#1E5A75" stroke-width="0.4" fill="none" opacity="0.3"/>
  <path d="M58 77 Q60 79 58 81" stroke="#1E5A75" stroke-width="0.4" fill="none" opacity="0.3"/>

  <!-- ===== EYE ===== -->
  <!-- Eye socket / ring -->
  <circle cx="48" cy="78" r="4.5" fill="#0F2A38" opacity="0.8"/>
  <!-- Iris -->
  <circle cx="48" cy="78" r="3.5" fill="url(#eyeGrad)"/>
  <!-- Pupil -->
  <circle cx="48" cy="78" r="1.8" fill="#050D12"/>
  <!-- Highlight -->
