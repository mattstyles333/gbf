<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 300 160" fill="none">
  <defs>
    <!-- Body gradients for depth -->
    <linearGradient id="bodyGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#9DD9E5"/>
      <stop offset="35%" stop-color="#6BB8D4"/>
      <stop offset="65%" stop-color="#4A9BB8"/>
      <stop offset="100%" stop-color="#2D7A9A"/>
    </linearGradient>
    <linearGradient id="bodyDark" x1="0%" y1="0%" x2="80%" y2="100%">
      <stop offset="0%" stop-color="#5A9AB8"/>
      <stop offset="100%" stop-color="#1E5A75"/>
    </linearGradient>
    <linearGradient id="tailGrad" x1="0%" y1="50%" x2="100%" y2="50%">
      <stop offset="0%" stop-color="#4A9BB8"/>
      <stop offset="100%" stop-color="#1E5A75"/>
    </linearGradient>
    <linearGradient id="dorsalGrad" x1="0%" y1="100%" x2="0%" y2="0%">
      <stop offset="0%" stop-color="#3A8090"/>
      <stop offset="100%" stop-color="#6BB8D4"/>
    </linearGradient>
    <linearGradient id="pectGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#4A9BB8"/>
      <stop offset="100%" stop-color="#7DC4D8"/>
    </linearGradient>
    <radialGradient id="eyeGrad" cx="35%" cy="35%" r="65%">
      <stop offset="0%" stop-color="#2C4A5A"/>
      <stop offset="100%" stop-color="#0A1E28"/>
    </radialGradient>
    <radialGradient id="snoutGrad" cx="0%" cy="50%" r="100%">
      <stop offset="0%" stop-color="#A8E0ED"/>
      <stop offset="100%" stop-color="#6BB8D4"/>
    </radialGradient>
  </defs>

  <!-- Drop shadow -->
  <ellipse cx="150" cy="90" rx="110" ry="28" fill="#0A1E28" opacity="0.15"/>

  <!-- ===== TAIL / CAUDAL FIN ===== -->
  <!-- Tail spread - left lobe -->
  <path d="M252 80 Q275 55 292 38 Q280 58 278 70 Q285 58 272 48 Q268 65 252 80Z" fill="url(#tailGrad)" opacity="0.95"/>
  <!-- Tail spread - right lobe -->
  <path d="M252 80 Q275 105 292 122 Q280 102 278 90 Q285 102 272 112 Q268 95 252 80Z" fill="url(#tailGrad)" opacity="0.95"/>
  <!-- Tail peduncle (narrowing) -->
  <path d="M238 78 Q248 75 255 76 Q248 80 255 84 Q248 85 238 82Z" fill="#1E5A75"/>
  <!-- Tail membrane detail left -->
  <path d="M252 80 Q268 62 278 52 M252 80 Q262 65 272 58" stroke="#1E5A75" stroke-width="0.6" fill="none" opacity="0.5"/>
  <!-- Tail membrane detail right -->
  <path d="M252 80 Q268 98 278 108 M252 80 Q262 95 272 102" stroke="#1E5A75" stroke-width="0.6" fill="none" opacity="0.5"/>

  <!-- ===== DORSAL FIN ===== -->
  <path d="M125 74 Q132 52 145 48 Q158 44 172 47 Q185 50 192 55 Q188 60 182 63 Q168 62 155 65 Q142 68 132 74Z" fill="url(#dorsalGrad)" opacity="0.85"/>
  <!-- Dorsal fin rays -->
  <path d="M135 62 Q138 55 142 52 M142 52 Q145 50 148 52 Q146 55 144 60" stroke="#A8E0ED" stroke-width="0.5" fill="none" opacity="0.5"/>
  <path d="M152 58 Q155 50 159 48 Q162 46 165 50 Q163 54 158 58" stroke="#A8E0ED" stroke-width="0.5" fill="none" opacity="0.5"/>
  <path d="M170 53 Q173 48 177 49 Q176 53 172 57" stroke="#A8E0ED" stroke-width="0.5" fill="none" opacity="0.5"/>

