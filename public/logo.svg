    M58 80
    Q65 72 80 70
    Q100 68 130 72
    Q160 76 190 80
    Q215 84 235 82
    Q245 80 252 80
    Q245 88 235 90
    Q215 92 190 88
    Q160 84 130 80
    Q100 76 80 78
    Q65 80 58 88
    Q55 84 58 80Z
  " fill="url(#bodyGrad)"/>

