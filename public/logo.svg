<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 48 48" fill="none">
  <!-- Wave rings (shallow water / flats feel) -->
  <ellipse cx="24" cy="24" rx="22" ry="8" stroke="#38BDF8" stroke-width="1" fill="none" opacity="0.25"/>
  <ellipse cx="24" cy="24" rx="16" ry="6" stroke="#38BDF8" stroke-width="1" fill="none" opacity="0.35"/>
  <ellipse cx="24" cy="24" rx="10" ry="3.5" stroke="#38BDF8" stroke-width="1" fill="none" opacity="0.45"/>

  <!-- Stylized bonefish (top-down, minimal) -->
  <!-- Body -->
  <ellipse cx="24" cy="24" rx="12" ry="4" fill="#0EA5E9"/>
  <!-- Darker center line -->
  <ellipse cx="24" cy="24" rx="8" ry="2" fill="#0369A1" opacity="0.4"/>
  <!-- Forked tail -->
  <path d="M36 24 Q40 20 44 18 Q41 22 40 24 Q41 26 44 30 Q40 28 36 24Z" fill="#0284C7"/>
  <!-- Head -->
  <ellipse cx="13" cy="24" rx="3" ry="3" fill="#0EA5E9"/>
  <!-- Snout -->
  <ellipse cx="10.5" cy="24" rx="1.8" ry="1.8" fill="#38BDF8"/>
  <!-- Dorsal fin line (center ridge) -->
  <path d="M16 21.5 Q20 20 24 21 Q28 22 32 21" stroke="#0369A1" stroke-width="0.8" fill="none" stroke-linecap="round"/>
  <!-- Gill hint -->
  <path d="M15 22.5 Q14 24 15 25.5" stroke="#0369A1" stroke-width="0.6" fill="none" stroke-linecap="round"/>
  <!-- Eye -->
  <circle cx="11" cy="23.2" r="1" fill="#0C4A6E"/>
  <circle cx="10.75" cy="23" r="0.3" fill="white" opacity="0.85"/>
  <!-- Scale shimmer lines -->
  <path d="M18 23.5 Q20 24 22 23.5" stroke="#7DD3FC" stroke-width="0.4" fill="none" stroke-linecap="round" opacity="0.7"/>
  <path d="M23 23.5 Q25 24 27 23.5" stroke="#7DD3FC" stroke-width="0.4" fill="none" stroke-linecap="round" opacity="0.7"/>
  <path d="M28 23.5 Q30 24 32 23.5" stroke="#7DD3FC" stroke-width="0.4" fill="none" stroke-linecap="round" opacity="0.6"/>
</svg>
